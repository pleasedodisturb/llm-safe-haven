# Per-project secret manifest
# Declares which secrets agents in this project are allowed to access.
# Check into git — this is a security policy, not a secret itself.
#
# The manifest follows least-privilege: agents can only access secrets
# explicitly listed here. Any access outside this list is denied by
# the credential proxy.

project: my-project

secrets:
  # API key retrieved from Bitwarden via rbw CLI
  - env: OPENROUTER_API_KEY
    source: bitwarden
    name: "OpenRouter API"
    field: api_key

  # Linear API token for task tracking
  - env: LINEAR_API_TOKEN
    source: bitwarden
    name: "Linear API"
    field: linear_api_key

  # GitHub token from gh auth (no Bitwarden needed)
  - env: GH_TOKEN
    source: gh-auth

  # Database connection string from Bitwarden
  - env: DATABASE_URL
    source: bitwarden
    name: "Production DB"
    field: connection_string

# Rate limits — enforced by the credential proxy per agent session
limits:
  max_requests_per_minute: 10
  max_unique_secrets_per_session: 5
