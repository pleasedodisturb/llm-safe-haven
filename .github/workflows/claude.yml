name: Claude

# @claude GitHub bot. Comment "@claude <request>" on any issue or PR (or open an
# issue containing @claude) and Claude analyzes, fixes, and opens a PR. A separate
# deterministic step then files a Linear ticket (team G) for the request — the
# runner has the network + secret access that Claude's sandbox does not.
# Auth: Claude Max OAuth token (no API cost). Only triggers for users with write
# access to the repo.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 30
            --allowedTools "Edit,Write,Read,Grep,Glob,Bash(git:*),Bash(gh:*),Bash(npm:*),Bash(uv:*),Bash(python:*),Bash(python3:*),Bash(pytest:*),Bash(make:*)"
            --append-system-prompt "You run in a GitHub Actions cloud runner with full repo write access. If the request is a bug or change that is DOABLE in this cloud environment, do it now: create a branch, implement the fix, run any available build/test tools to validate it, and open a PR that references this issue/PR. Only stop at analysis if the fix genuinely needs an environment this runner does not have (then say exactly what is missing). A Linear ticket (team G) is filed automatically by a later workflow step, so do not create one yourself."

      - name: File Linear ticket for the request
        if: always()
        env:
          LINEAR_API_TOKEN: ${{ secrets.LINEAR_API_TOKEN }}
          REQ_TITLE: ${{ github.event.issue.title || github.event.pull_request.title || 'github @claude request' }}
          REQ_URL: ${{ github.event.issue.html_url || github.event.pull_request.html_url || github.event.comment.html_url }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          tok = os.environ["LINEAR_API_TOKEN"]
          def gql(q, v=None):
              data = json.dumps({"query": q, "variables": v or {}}).encode()
              req = urllib.request.Request(
                  "https://api.linear.app/graphql", data=data,
                  headers={"Authorization": tok, "Content-Type": "application/json"})
              return json.load(urllib.request.urlopen(req, timeout=30))
          team = gql('query{teams(filter:{key:{eq:"G"}}){nodes{id}}}')["data"]["teams"]["nodes"][0]["id"]
          title = "@claude: " + os.environ["REQ_TITLE"]
          desc = ("Auto-filed by the @claude GitHub bot in `%s`.\n\nRequest: %s"
                  % (os.environ["REPO"], os.environ.get("REQ_URL", "")))
          res = gql(
              "mutation($t:String!,$d:String!,$tm:String!){issueCreate(input:{title:$t,description:$d,teamId:$tm}){issue{identifier url}}}",
              {"t": title, "d": desc, "tm": team})
          iss = res["data"]["issueCreate"]["issue"]
          print("Filed Linear ticket %s -> %s" % (iss["identifier"], iss["url"]))
          PY
