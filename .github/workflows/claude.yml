name: Claude

# @claude intake bot. Comment "@claude <request>" on any issue or PR (or open an
# issue containing @claude) and Claude runs INTAKE + REVIEW (read-only — it does
# NOT change code): it studies the repo, then a later step creates a complete,
# standard-compliant Linear ticket (team G) with a preliminary plan, project,
# labels, priority, estimate, and links to related PRs/tickets.
# Auth: Claude Max OAuth token (no API cost). Only triggers for write-access users.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude Code (intake + review)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 30
            --allowedTools "Read,Grep,Glob,Bash(git:*),Bash(gh:*)"
            --append-system-prompt "You are an INTAKE ANALYST for team G's Linear. Do NOT modify code, run fixes, or open PRs. Read the @claude request, then REVIEW this repository to ground a ticket: use gh to find related PRs/issues, and git log/grep to find relevant files, recent changes, and any G-XXXX Linear references. Produce a complete agent-autonomous-ready ticket as structured output following team G's standard — a specific imperative title; best-fit Linear project name; Problem/Goal with evidence; Context; numbered binary acceptance_criteria; exact verification_commands; specific files_to_modify with what to change in each; constraints; definition_of_done; an ordered preliminary_plan; ranked root_cause_hypotheses for bugs; scope (S/M/L); parallel_safe; worktree (not-needed/recommended/required); priority (1 urgent..4 low); estimate on the Exponential scale (1,2,3,5,8); labels including exactly one of route/agent or route/human-only; related_github (PR/issue URLs you found); related_linear (G-XXXX you found). Be specific and evidence-based; omit any field you cannot determine rather than guessing. Also post a concise human-readable summary of your intake and review findings as your GitHub reply."
            --json-schema '{"type":"object","properties":{"title":{"type":"string"},"project":{"type":"string"},"problem_goal":{"type":"string"},"context":{"type":"string"},"acceptance_criteria":{"type":"array","items":{"type":"string"}},"verification_commands":{"type":"array","items":{"type":"string"}},"files_to_modify":{"type":"array","items":{"type":"string"}},"constraints":{"type":"array","items":{"type":"string"}},"definition_of_done":{"type":"array","items":{"type":"string"}},"preliminary_plan":{"type":"array","items":{"type":"string"}},"root_cause_hypotheses":{"type":"array","items":{"type":"string"}},"scope":{"type":"string"},"parallel_safe":{"type":"boolean"},"worktree":{"type":"string"},"priority":{"type":"integer"},"estimate":{"type":"integer"},"labels":{"type":"array","items":{"type":"string"}},"related_github":{"type":"array","items":{"type":"string"}},"related_linear":{"type":"array","items":{"type":"string"}},"tests_required":{"type":"string"}},"required":["title","problem_goal","acceptance_criteria","preliminary_plan","scope","priority"]}'

      - name: Create Linear intake ticket
        if: steps.claude.outputs.structured_output != ''
        env:
          LINEAR_API_TOKEN: ${{ secrets.LINEAR_API_TOKEN }}
          STRUCTURED: ${{ steps.claude.outputs.structured_output }}
          REPO: ${{ github.repository }}
          REQ_TITLE: ${{ github.event.issue.title || github.event.pull_request.title || 'github @claude request' }}
          REQ_URL: ${{ github.event.issue.html_url || github.event.pull_request.html_url || github.event.comment.html_url }}
        run: python3 .github/scripts/intake_to_linear.py

      - name: Reply with Linear ticket link
        if: env.LINEAR_ID != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number || github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "📋 Intake ticket filed: **${LINEAR_ID}** — ${LINEAR_URL}" || true
