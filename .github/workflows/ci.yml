name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
      - run: node -c hooks/bash-firewall.js
      - run: node -c hooks/secret-guard.js
      - run: node -c hooks/audit-logger.js
      - run: node bin/llm-safe-haven.js --version
      - run: node bin/llm-safe-haven.js --help
