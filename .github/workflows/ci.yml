name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '18'
      - run: node -c hooks/bash-firewall.js
      - run: node -c hooks/secret-guard.js
      - run: node -c hooks/audit-logger.js
      - run: node bin/llm-safe-haven.js --version
      - run: node bin/llm-safe-haven.js --help
