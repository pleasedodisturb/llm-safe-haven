name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
      - run: node -c hooks/bash-firewall.js
      - run: node -c hooks/secret-guard.js
      - run: node -c hooks/audit-logger.js
      - run: node bin/llm-safe-haven.js --version
      - run: node bin/llm-safe-haven.js --help
      # Coverage gate: fails the job (exit 1) below an 85% line floor.
      # bin/** and scripts/** are excluded from the denominator (kept out
      # of the floor intentionally -- exercised only by the smoke steps
      # above, not by unit tests) so the ratchet measures shipped
      # lib/hooks code, not CLI glue.
      - run: npm run test:coverage
